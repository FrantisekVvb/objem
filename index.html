<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Objem</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      color: #1a1a1a;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }

    #stage {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      height: 100vh;
      height: 100dvh;
      padding: 16px;
      background: #ffffff;
      overflow: hidden;
    }

    .ui-overlay {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 10px 14px;
      width: 100%;
      max-width: 980px;
    }

    .toolbar-btn,
    #verify-btn,
    #apply-cuboid-size-btn {
      padding: 10px 18px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      background: #ffffff;
      color: #1a1a1a;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.06);
    }

    .toolbar-btn:hover,
    #verify-btn:hover,
    #apply-cuboid-size-btn:hover {
      border-color: #9ca3af;
      background: #f9fafb;
    }

    .toolbar-btn.is-active {
      border-color: #3b50f0;
      background: #f4f6ff;
      color: #1e2a8a;
    }

    .ui-overlay.is-free-surface .volume-quiz,
    .ui-overlay.is-free-surface .cuboid-size-quiz {
      display: none !important;
    }

    .volume-quiz,
    .cuboid-size-quiz {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.06);
    }

    .volume-quiz-label {
      font-size: 0.95rem;
      font-weight: 500;
      white-space: nowrap;
    }

    #volume-value,
    .cuboid-dim-input {
      width: 56px;
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      background: #ffffff;
      font-size: 0.95rem;
      font-family: inherit;
      text-align: center;
    }

    #volume-value {
      width: 88px;
    }

    #volume-value:focus,
    .cuboid-dim-input:focus {
      outline: none;
      border-color: #3b50f0;
    }

    .dim-sep,
    .dim-unit {
      font-size: 0.95rem;
      font-weight: 500;
      color: #4b5563;
    }

    #volume-value.is-correct,
    .cuboid-dim-input.is-correct {
      border-color: #16a34a;
      background: #ecfdf5;
      color: #166534;
    }

    #volume-value.is-wrong,
    .cuboid-dim-input.is-wrong {
      border-color: #dc2626;
      background: #fef2f2;
      color: #991b1b;
    }

    #volume-unit {
      min-width: 92px;
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      background: #ffffff;
      font-size: 0.95rem;
      font-family: inherit;
      cursor: pointer;
    }

    #volume-unit:focus {
      outline: none;
      border-color: #3b50f0;
    }

    #volume-unit.is-correct {
      border-color: #16a34a;
      background: #ecfdf5;
      color: #166534;
    }

    #volume-unit.is-wrong {
      border-color: #dc2626;
      background: #fef2f2;
      color: #991b1b;
    }

    #verify-btn.is-correct {
      border-color: #16a34a;
      background: #ecfdf5;
      color: #166534;
    }

    #verify-btn.is-wrong {
      border-color: #dc2626;
      background: #fef2f2;
      color: #991b1b;
    }

    #diagram-wrap {
      flex: 1 1 auto;
      min-height: 0;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: visible;
    }

    #diagram {
      display: block;
      touch-action: none;
      user-select: none;
      overflow: visible;
    }

    .stack-cube {
      cursor: grab;
    }

    .stack-cube:active {
      cursor: grabbing;
    }

    #static-layer,
    #cuboid-hidden-edges,
    #label-layer,
    #cuboid-front-overlay,
    #cuboid-exact,
    #cuboid-exact-labels,
    #cuboid-dynamic,
    #cuboid-dynamic-labels {
      pointer-events: none;
    }

    .placed-cube {
      cursor: grab;
    }

    .placed-cube.is-dragging {
      cursor: grabbing;
    }

    #diagram {
      cursor: grab;
    }

    #diagram.is-dragging {
      cursor: grabbing;
    }

    .stack-hit {
      fill: transparent;
      stroke: none;
      pointer-events: all;
    }

    .cube-hit {
      fill: transparent;
      stroke: none;
      pointer-events: all;
    }
  </style>
</head>
<body>
  <main id="stage">
    <div class="ui-overlay">
      <button id="new-cuboid-btn" class="toolbar-btn" type="button">Nový kvádr</button>
      <div class="cuboid-size-quiz" id="cuboid-size-quiz">
        <span class="volume-quiz-label">Rozměry</span>
        <input id="cuboid-width" class="cuboid-dim-input" type="number" min="1" step="1" inputmode="numeric" aria-label="Šířka v cm" />
        <span class="dim-sep" aria-hidden="true">×</span>
        <input id="cuboid-depth" class="cuboid-dim-input" type="number" min="1" step="1" inputmode="numeric" aria-label="Hloubka v cm" />
        <span class="dim-sep" aria-hidden="true">×</span>
        <input id="cuboid-height" class="cuboid-dim-input" type="number" min="1" step="1" inputmode="numeric" aria-label="Výška v cm" />
        <span class="dim-unit">cm</span>
        <button id="apply-cuboid-size-btn" type="button">Nastavit</button>
      </div>
      <button id="free-surface-btn" class="toolbar-btn" type="button">Volná plocha</button>
      <div class="volume-quiz" id="volume-quiz">
        <span class="volume-quiz-label">Objem kvádru je</span>
        <input id="volume-value" type="number" min="0" step="any" inputmode="decimal" aria-label="Hodnota objemu" />
        <select id="volume-unit" aria-label="Jednotka objemu">
          <option value="cm3">cm³</option>
          <option value="mm3">mm³</option>
        </select>
        <button id="verify-btn" type="button">Ověřit</button>
      </div>
    </div>
